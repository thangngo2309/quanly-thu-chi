services:
  init-db:
    image: postgres:16-alpine
    container_name: qltc-init-db-prod
    restart: "no"

    env_file:
      - .env.prod

    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
      DB_ADMIN_DB: "${DB_ADMIN_DB:-postgres}"

    command:
      - sh
      - -ec
      - |
          export PGPASSWORD="$$DB_PASSWORD"

          echo "Đang chờ PostgreSQL tại $$DB_HOST:$$DB_PORT..."

          until pg_isready \
            -h "$$DB_HOST" \
            -p "$$DB_PORT" \
            -U "$$DB_USERNAME"
          do
            sleep 2
          done

          echo "PostgreSQL đã sẵn sàng."

          DATABASE_EXISTS=$$(psql \
            -h "$$DB_HOST" \
            -p "$$DB_PORT" \
            -U "$$DB_USERNAME" \
            -d "$$DB_ADMIN_DB" \
            -tAc "SELECT 1 FROM pg_database WHERE datname = '$$DB_NAME'")

          if [ "$$DATABASE_EXISTS" = "1" ]; then
            echo "Database $$DB_NAME đã tồn tại."
          else
            echo "Đang tạo database $$DB_NAME..."

            createdb \
              -h "$$DB_HOST" \
              -p "$$DB_PORT" \
              -U "$$DB_USERNAME" \
              -O "$$DB_USERNAME" \
              "$$DB_NAME"

            echo "Đã tạo database $$DB_NAME."
          fi

    networks:
      - shared-database-network-prod

  backend:
    container_name: qltc-backend-prod
    restart: unless-stopped
    init: true

    build:
      context: ./backend
      dockerfile: Dockerfile.prod

    env_file:
      - .env.prod

    environment:
      NODE_ENV: production
      PORT: "${BE_PORT}"

      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
      DB_SYNC: "${DB_SYNC}"

      FRONTEND_URL: "${FRONTEND_URL}"

    ports:
      - "127.0.0.1:${BE_PORT}:${BE_PORT}"

    depends_on:
      init-db:
        condition: service_completed_successfully

    networks:
      - qltc-network-prod
      - shared-database-network-prod

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    container_name: qltc-frontend-prod
    restart: unless-stopped
    init: true

    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
        NEXT_PUBLIC_BASE_PATH: "${NEXT_PUBLIC_BASE_PATH}"

    env_file:
      - .env.prod

    environment:
      NODE_ENV: production
      PORT: "${FE_PORT}"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
      NEXT_PUBLIC_BASE_PATH: "${NEXT_PUBLIC_BASE_PATH}"

    ports:
      - "127.0.0.1:${FE_PORT}:${FE_PORT}"

    depends_on:
      backend:
        condition: service_started

    networks:
      - qltc-network-prod

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  qltc-network-prod:
    name: qltc-network-prod
    driver: bridge

  shared-database-network-prod:
    external: true
    name: shared-database-network-prod